# playwright.yml
# Purpose: Manual test runs and debugging
# NOT triggered automatically on push
# Use this to run tests on demand

name: CAI Software - Playwright Test Suite

on:
  # ONLY manual trigger
  # Does not run automatically on push
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
      test-file:
        description: 'Specific test to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - login
          - products
          - selfHealing

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ inputs.browser }}

      - name: Run Selected Tests
        run: |
          if [ "${{ inputs.test-file }}" == "all" ]; then
            npx playwright test \
            --project=${{ inputs.browser }} \
            --reporter=html
          else
            npx playwright test \
            tests/e2e/${{ inputs.test-file }}.spec.js \
            --project=${{ inputs.browser }} \
            --reporter=html
          fi
        env:
          BASE_URL: https://www.saucedemo.com
          ADMIN_USER: standard_user
          ADMIN_PASS: secret_sauce
          CI: true

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manual-test-report
          path: playwright-report/
          retention-days: 7