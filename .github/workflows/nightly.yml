# .github/workflows/nightly.yml

name: CAI Software - Nightly Full Suite

on:
  # ─── Scheduled trigger ──────────────────────────
  schedule:
    # Runs at 11 PM IST every day
    # IST is UTC+5:30
    # So 11 PM IST = 17:30 UTC
    # Format: minute hour day month weekday
    - cron: '30 17 * * *'

  # ─── Manual trigger ─────────────────────────────
  # Allows running from GitHub UI anytime
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      suite:
        description: 'Test suite to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - smoke
          - regression

jobs:

  # ─── Job 1: Smoke Tests ───────────────────────────
  nightly-smoke:
    name: "Nightly Smoke - Critical Paths"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Smoke Tests
        run: npx playwright test tests/e2e/login.spec.js --project=chromium --reporter=list
        env:
          BASE_URL: https://www.saucedemo.com
          ADMIN_USER: standard_user
          ADMIN_PASS: secret_sauce
          CI: true

      - name: Upload Smoke Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-smoke-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  # ─── Job 2: Full Regression ───────────────────────
  nightly-regression:
    name: "Nightly Regression - All Modules"
    runs-on: ubuntu-latest
    needs: nightly-smoke

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Full Regression
        run: npx playwright test tests/e2e/ --project=chromium --reporter=html
        env:
          BASE_URL: https://www.saucedemo.com
          ADMIN_USER: standard_user
          ADMIN_PASS: secret_sauce
          CI: true

      - name: Upload Regression Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-regression-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  # ─── Job 3: API Tests ─────────────────────────────
  nightly-api:
    name: "Nightly API - Backend Validation"
    runs-on: ubuntu-latest
    needs: nightly-smoke

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run API Tests
        run: npx playwright test tests/api/ --project=chromium --reporter=list
        env:
          BASE_URL: https://www.saucedemo.com
          CI: true

      - name: Upload API Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-api-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  # ─── Job 4: Cross Browser ─────────────────────────
  nightly-cross-browser:
    name: "Nightly Cross Browser"
    runs-on: ubuntu-latest
    needs: nightly-regression

    strategy:
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run on ${{ matrix.browser }}
        run: npx playwright test tests/e2e/login.spec.js --project=${{ matrix.browser }} --reporter=list
        env:
          BASE_URL: https://www.saucedemo.com
          ADMIN_USER: standard_user
          ADMIN_PASS: secret_sauce
          CI: true

      - name: Upload ${{ matrix.browser }} Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ matrix.browser }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  # ─── Job 5: Self Healing Report ───────────────────
  nightly-self-healing:
    name: "Nightly Self Healing Suite"
    runs-on: ubuntu-latest
    needs: nightly-regression

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Self Healing Tests
        run: npx playwright test tests/e2e/selfHealing.spec.js --project=chromium --reporter=list
        env:
          BASE_URL: https://www.saucedemo.com
          CI: true

      - name: Upload Healing Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-healing-report-${{ github.run_number }}
          path: |
            playwright-report/
            healing-report.json
          retention-days: 30

  # ─── Job 6: Nightly Quality Gate ──────────────────
  nightly-quality-gate:
    name: "Nightly Quality Gate"
    runs-on: ubuntu-latest
    needs:
      - nightly-regression
      - nightly-api
      - nightly-cross-browser
      - nightly-self-healing
    if: always()

    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: all-nightly-reports/

      - name: Generate Quality Gate Report
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   CAI SOFTWARE - NIGHTLY QUALITY REPORT  "
          echo "   $(date '+%Y-%m-%d %H:%M:%S IST')       "
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Suite              Status    "
          echo "─────────────────────────────"
          echo "Smoke Tests      : ${{ needs.nightly-smoke.result }}"
          echo "Regression       : ${{ needs.nightly-regression.result }}"
          echo "API Tests        : ${{ needs.nightly-api.result }}"
          echo "Cross Browser    : ${{ needs.nightly-cross-browser.result }}"
          echo "Self Healing     : ${{ needs.nightly-self-healing.result }}"
          echo "─────────────────────────────"

      - name: Set Release Confidence
        run: |
          if [ "${{ needs.nightly-regression.result }}" == "success" ] && \
             [ "${{ needs.nightly-api.result }}" == "success" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 RELEASE CONFIDENCE : GREEN ✅  "
            echo "   Safe to deploy to production   "
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🛑 RELEASE CONFIDENCE : RED ❌    "
            echo "   Do NOT deploy to production    "
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

      - name: Upload Combined Nightly Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-combined-report-${{ github.run_number }}
          path: all-nightly-reports/
          retention-days: 30