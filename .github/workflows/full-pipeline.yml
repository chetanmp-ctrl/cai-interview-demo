name: CAI Software - Full Quality Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  code-quality:
    name: "Stage 1 - Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Verify Project Structure
        run: |
          echo "Checking Project Structure"
          echo "Pages Directory:"
          ls pages/
          echo "Tests Directory:"
          ls tests/e2e/
          echo "Utils Directory:"
          ls utils/
          echo "Structure verified"

  api-tests:
    name: "Stage 2 - API Tests"
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run API Tests
        run: npx playwright test tests/api/ --project=chromium --reporter=list

      - name: Upload API Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: playwright-report/
          retention-days: 7

  e2e-tests:
    name: "Stage 3 - E2E Tests"
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npx playwright test tests/e2e/ --project=chromium --reporter=html
        env:
          BASE_URL: https://www.saucedemo.com
          ADMIN_USER: standard_user
          ADMIN_PASS: secret_sauce

      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: playwright-report/
          retention-days: 30

  cross-browser:
    name: "Stage 4 - Cross Browser"
    runs-on: ubuntu-latest
    needs: e2e-tests
    strategy:
      matrix:
        browser: [chromium, firefox]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Tests on ${{ matrix.browser }}
        run: npx playwright test tests/e2e/login.spec.js --project=${{ matrix.browser }}
        env:
          BASE_URL: https://www.saucedemo.com
          ADMIN_USER: standard_user
          ADMIN_PASS: secret_sauce

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.browser }}-results
          path: playwright-report/
          retention-days: 7

  quality-gate:
    name: "Stage 5 - Quality Gate"
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - e2e-tests
      - cross-browser
    steps:
      - name: Quality Gate Report
        run: |
          echo "CAI SOFTWARE QUALITY GATE REPORT"
          echo "Stage 1 - Code Quality  : PASSED"
          echo "Stage 2 - API Tests     : PASSED"
          echo "Stage 3 - E2E Tests     : PASSED"
          echo "Stage 4 - Cross Browser : PASSED"
          echo "RELEASE CONFIDENCE      : GREEN"