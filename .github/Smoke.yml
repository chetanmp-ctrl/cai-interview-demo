# .github/workflows/smoke.yml

name: CAI Software - PR Smoke Tests

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  smoke:
    name: "PR Smoke - Quick Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Smoke Tests
        run: npx playwright test tests/e2e/login.spec.js --project=chromium --reporter=list
        env:
          BASE_URL: https://www.saucedemo.com
          ADMIN_USER: standard_user
          ADMIN_PASS: secret_sauce
          CI: true

      - name: Upload Smoke Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-smoke-results
          path: playwright-report/
          retention-days: 7